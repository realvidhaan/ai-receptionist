# Render Blueprint for the AI receptionist.
# Secrets are set as env vars (incl. SA_KEY_JSON = the full service-account JSON), so no files to upload.
# After first deploy, set PUBLIC_BASE to the service URL Render assigns.
services:
  - type: web
    name: ai-receptionist
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: TZ
        value: America/Los_Angeles
      - key: SA_KEY_JSON
        sync: false
      - key: SA_KEY_PATH
        sync: false
      - key: GEMINI_KEY
        sync: false
      - key: MAPS_KEY
        sync: false
      - key: SHEET_ID
        sync: false
      - key: CALENDAR_ID
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PW
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: BUSINESS
        sync: false
      - key: CITY
        sync: false
      - key: PROVISION_SECRET
        sync: false
      - key: SHEET_CREATOR_URL
        sync: false
      - key: PUBLIC_BASE
        sync: false                          # set to https://ai-receptionist.onrender.com after first deploy
